csl: apa.csl

format:
  html:
    theme:
      light: [litera, styles.scss]
      dark:  [litera, styles-dark.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    code-copy: true
    highlight-style: github
    fig-width: 7
    fig-height: 4.5
    fig-responsive: true
    number-sections: true
    number-depth: 3
    link-external-newwindow: true
    smooth-scroll: true
    callout-appearance: simple
    mermaid:
      theme: neutral
  pdf:
    documentclass: scrbook
    papersize: letter
    geometry:
      - margin=1in
    fontsize: 11pt
    number-sections: true
    toc: true
    toc-depth: 3
    colorlinks: true
    keep-tex: false
    code-block-bg: true
    highlight-style: github
    include-in-header:
      text: |
        \usepackage{amsmath}
        \usepackage{amssymb}
        \usepackage{mathtools}
        \usepackage{bm}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{siunitx}
  epub:
    toc: true
    cover-image: figures/cover.png

crossref:
  chapters: true
  eq-prefix: Eq.
  fig-prefix: Figure
  tbl-prefix: Table

filters: []

jupyter: credit-scoring-book

license: "CC-BY-4.0 for text; MIT for code. See LICENSE."
