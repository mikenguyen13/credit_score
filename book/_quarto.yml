project:
  type: book
  output-dir: _book
  execute-dir: file

execute:
  freeze: auto
  cache: false
  warning: false

book:
  title: "Credit Scoring: Theory, Methods, and Practice"
  subtitle: "An Executable Handbook for Practitioners and Academics"
  author: "Mike Nguyen"
  date: today
  date-format: iso
  description: |
    End-to-end treatment of credit scoring. Math, derivations, runnable Python,
    publicly available data, and cloud-agnostic deployment patterns.
  cover-image: figures/cover.png
  favicon: figures/favicon.png
  repo-url: https://github.com/credit-scoring-book/book
  repo-branch: main
  repo-actions: [edit, issue]
  search: true
  sharing: [twitter, linkedin]
  downloads: [pdf, epub]
  page-navigation: true
  reader-mode: true
  sidebar:
    style: docked
    collapse-level: 1
    pinned: true

  chapters:
    - index.qmd
    - part: "Part I — Foundations of Credit Scoring"
      chapters:
        - chapters/01-introduction.qmd
        - chapters/02-formal-setup.qmd
        - chapters/03-data.qmd
        - chapters/04-metrics.qmd
        - chapters/05-regulation.qmd
    - part: "Part II — Classical Statistical Methods"
      chapters:
        - chapters/06-discriminant-analysis.qmd
        - chapters/07-logistic-scorecard.qmd
        - chapters/08-structural-models.qmd
        - chapters/09-survival-analysis.qmd
        - chapters/10-reject-inference.qmd
    - part: "Part III — Machine Learning Methods"
      chapters:
        - chapters/11-trees-rules.qmd
        - chapters/12-ensembles.qmd
        - chapters/13-svm.qmd
        - chapters/14-neural-networks.qmd
        - chapters/15-imbalanced.qmd
        - chapters/16-benchmarking.qmd
    - part: "Part IV — Alternative Data and FinTech Scoring"
      chapters:
        - chapters/17-digital-footprints.qmd
        - chapters/18-open-banking.qmd
        - chapters/19-p2p-lending.qmd
        - chapters/20-bigtech-credit.qmd
    - part: "Part V — Explainability and Fairness"
      chapters:
        - chapters/21-xai.qmd
        - chapters/22-shap-practice.qmd
        - chapters/22b-xper-performance.qmd
        - chapters/22c-deep-xai.qmd
        - chapters/22d-conformal-uncertainty.qmd
        - chapters/22e-explanation-quality.qmd
        - chapters/23-fairness-theory.qmd
        - chapters/24-fairness-empirical.qmd
    - part: "Part VI — Frontier Methods"
      chapters:
        - chapters/25-nlp-text.qmd
        - chapters/26-llm-credit.qmd
        - chapters/27-gnn-credit.qmd
        - chapters/28-causal-credit.qmd
    - part: "Part VII — Specialized Applications and Future Directions"
      chapters:
        - chapters/29-corporate-sme.qmd
        - chapters/30-mortgage.qmd
        - chapters/31-inclusion-emerging.qmd
        - chapters/32-dynamic-behavioral.qmd
        - chapters/33-future.qmd
    - part: "Part VIII — Production and Regulatory Capital"
      chapters:
        - chapters/34-mlops-deployment.qmd
        - chapters/35-ifrs9-cecl-stress.qmd
    - references.qmd
  appendices:
    - appendices/A-math-prereqs.qmd
    - appendices/B-env-setup.qmd
    - appendices/C-datasets.qmd

bibliography: references.bib
csl: apa.csl

format:
  html:
    theme:
      light: [litera, styles.scss]
      dark:  [litera, styles-dark.scss]
    toc: true
    toc-depth: 3
    toc-location: right
    code-fold: true
    code-summary: "Show code"
    code-tools: true
    code-copy: true
    highlight-style: github
    fig-width: 7
    fig-height: 4.5
    fig-responsive: true
    number-sections: true
    number-depth: 3
    link-external-newwindow: true
    smooth-scroll: true
    callout-appearance: simple
    mermaid:
      theme: neutral
  pdf:
    documentclass: scrbook
    papersize: letter
    geometry:
      - margin=1in
    fontsize: 11pt
    number-sections: true
    toc: true
    toc-depth: 3
    colorlinks: true
    keep-tex: false
    code-block-bg: true
    highlight-style: github
    include-in-header:
      text: |
        \usepackage{amsmath}
        \usepackage{amssymb}
        \usepackage{mathtools}
        \usepackage{bm}
        \usepackage{booktabs}
        \usepackage{longtable}
        \usepackage{siunitx}
  epub:
    toc: true
    cover-image: figures/cover.png

crossref:
  chapters: true
  eq-prefix: Eq.
  fig-prefix: Figure
  tbl-prefix: Table

filters: []

jupyter: credit-scoring-book

license: "CC-BY-4.0 for text; MIT for code. See LICENSE."
